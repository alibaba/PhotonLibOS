      - name: Test epoll
        run: |
          cd build && ctest -E test-lockfree --timeout 3600 -V
      - name: Test io_uring
        run: |
          export PHOTON_CI_EV_ENGINE=io_uring
          cd build && ctest -E test-lockfree --timeout 3600 -V
