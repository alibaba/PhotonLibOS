                         -D PHOTON_ENABLE_FUSE=ON         \
                         -D PHOTON_ENABLE_URING=ON        \
                         -D PHOTON_ENABLE_LIBCURL=ON      \
                         -D PHOTON_ENABLE_EXTFS=ON
          cmake --build build -j $(nproc) -- VERBOSE=1
      - name: Test epoll
        run: |
